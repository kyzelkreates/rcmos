  <circle cx="150" cy="110" r="2" fill="rgba(143,92,255,0.6)"/>
  <line x1="92" y1="110" x2="107" y2="110" stroke="rgba(143,92,255,0.25)" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="133" y1="110" x2="148" y2="110" stroke="rgba(143,92,255,0.25)" stroke-width="0.8" stroke-dasharray="2 2"/>

