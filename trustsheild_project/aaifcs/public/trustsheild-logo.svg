  <circle cx="120" cy="110" r="22" fill="rgba(55,255,139,0.07)" stroke="rgba(55,255,139,0.3)" stroke-width="1.2"/>
  <circle cx="120" cy="110" r="13" fill="rgba(55,255,139,0.12)" stroke="rgba(55,255,139,0.5)" stroke-width="1"/>
  <circle cx="120" cy="110" r="6"  fill="#37ff8b"/>
  <circle cx="120" cy="110" r="2.5" fill="#050505"/>

  <!-- Corner bracket ticks — top left -->
  <line x1="70" y1="70" x2="82" y2="70" stroke="rgba(214,168,79,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="70" x2="70" y2="82" stroke="rgba(214,168,79,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner bracket ticks — top right -->
