    stroke-linejoin="round"
  />

  <!-- Horizontal scan lines inside shield -->
  <line x1="68" y1="94"  x2="172" y2="94"  stroke="rgba(214,168,79,0.18)" stroke-width="0.8"/>
  <line x1="64" y1="118" x2="176" y2="118" stroke="rgba(214,168,79,0.12)" stroke-width="0.6"/>
  <line x1="70" y1="142" x2="170" y2="142" stroke="rgba(214,168,79,0.08)" stroke-width="0.5"/>

