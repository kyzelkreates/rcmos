<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="TrustSheild OS™ logo mark">
  <!-- Background -->
  <rect width="200" height="200" fill="#050505"/>

  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="92" stroke="rgba(214,168,79,0.15)" stroke-width="1"/>
  <circle cx="100" cy="100" r="88" stroke="rgba(214,168,79,0.08)" stroke-width="0.5"/>

  <!-- Shield outer body -->
  <path
    d="M100 20 L168 50 L168 105 C168 148 138 178 100 192 C62 178 32 148 32 105 L32 50 Z"
    fill="rgba(214,168,79,0.06)"
    stroke="rgba(214,168,79,0.7)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Shield inner panel -->
  <path
    d="M100 32 L156 58 L156 105 C156 142 130 168 100 180 C70 168 44 142 44 105 L44 58 Z"
    fill="rgba(143,92,255,0.06)"
    stroke="rgba(143,92,255,0.4)"
    stroke-width="1.2"
    stroke-linejoin="round"
  />

  <!-- Horizontal line accents -->
  <line x1="56" y1="88" x2="144" y2="88" stroke="rgba(214,168,79,0.2)" stroke-width="0.8"/>
  <line x1="52" y1="108" x2="148" y2="108" stroke="rgba(214,168,79,0.15)" stroke-width="0.6"/>

  <!-- Centre AI node -->
  <circle cx="100" cy="100" r="16" fill="rgba(55,255,139,0.1)" stroke="rgba(55,255,139,0.4)" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="9"  fill="rgba(55,255,139,0.8)"/>
  <circle cx="100" cy="100" r="4"  fill="#050505"/>

  <!-- Corner tick marks -->
  <line x1="60" y1="62" x2="70" y2="62" stroke="rgba(214,168,79,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="62" x2="60" y2="72" stroke="rgba(214,168,79,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="62" x2="130" y2="62" stroke="rgba(214,168,79,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="62" x2="140" y2="72" stroke="rgba(214,168,79,0.5)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
