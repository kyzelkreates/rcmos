name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_OPENAI_KEY:        ${{ secrets.VITE_OPENAI_KEY }}
          VITE_OPENROUTER_KEY:    ${{ secrets.VITE_OPENROUTER_KEY }}
          VITE_GROQ_KEY:          ${{ secrets.VITE_GROQ_KEY }}
          VITE_DEEPSEEK_KEY:      ${{ secrets.VITE_DEEPSEEK_KEY }}
          VITE_MISTRAL_KEY:       ${{ secrets.VITE_MISTRAL_KEY }}
          VITE_ANTHROPIC_KEY:     ${{ secrets.VITE_ANTHROPIC_KEY }}
          VITE_GEMINI_KEY:        ${{ secrets.VITE_GEMINI_KEY }}
          VITE_GRAPHHOPPER_KEY:   ${{ secrets.VITE_GRAPHHOPPER_KEY }}
          VITE_GOOGLE_MAPS_KEY:   ${{ secrets.VITE_GOOGLE_MAPS_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
